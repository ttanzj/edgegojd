name: 🧹 Cleanup GHCR Images - Keep Latest 5

on:
  workflow_dispatch:          # 手动触发
  push:                       # 代码推送时触发（可改成只触发 main 分支）
    branches: [ main, master ]

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: 🧹 清理 edgegojd 镜像（保留最近 5 个）
        uses: snok/container-retention-policy@v3.0.1
        with:
          account: ${{ github.repository_owner }}
          token: ${{ secrets.GITHUB_TOKEN }}
          
          image-names: edgegojd                    # ← 你的镜像名称
          
          # 核心策略：
          keep-at-least: 5                         # 至少保留 5 个最新镜像（不够5个时不删除）
          cut-off: 3650d                           # 超长时间，实际按“最新5个”逻辑清理
          
          # 只有超过一定数量时才真正清理（推荐搭配）
          filter-tagged: false
          filter-untagged: false
          dry-run: false                           # 第一次测试时改为 true（只看不删）

      - name: ✅ 清理完成
        run: |
          echo "🎉 镜像清理完成！"
          echo "策略：保留最近 5 个镜像（少于5个时不删除）"
