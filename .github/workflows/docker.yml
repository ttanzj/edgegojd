name: 🧹 Cleanup GHCR Images - Keep Latest 5

on:
  workflow_dispatch:           # 手动触发
  push:                        # 代码有更改时触发
    branches: [ main, master ]

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: 🧹 保留最近 5 个 edgegojd 镜像
        uses: snok/container-retention-policy@v3.0.1
        with:
          account: ${{ github.repository_owner }}
          token: ${{ secrets.GITHUB_TOKEN }}
          
          image-names: edgegojd                    # ← 修改成你的镜像名称
          
          keep-n-most-recent: 5                    # 保留最近 5 个镜像（核心参数）
          cut-off: 3650d                           # 非常长的天数，确保主要按数量清理
          
          tag-selection: both                      # 处理有 tag 和无 tag 的镜像
          dry-run: false                           # 第一次测试时请改为 true

      - name: ✅ 清理完成提示
        run: |
          echo "🎉 镜像清理任务完成！"
          echo "策略：始终保留最近 5 个镜像（少于5个时不删除任何镜像）"
