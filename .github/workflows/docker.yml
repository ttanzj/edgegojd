name: Docker Build & Push to GHCR + Cleanup

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-platform
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/edgegojd:latest
            ghcr.io/${{ github.repository_owner }}/edgegojd:${{ github.sha }}
          # platforms: linux/amd64,linux/arm64  # 如果需要多架构支持，取消注释
          cache-from: type=gha
          cache-to: type=gha,mode=max

  cleanup:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    permissions:
      packages: write  # 实际删除权限靠下面的 PAT

    steps:
      - name: Keep recent 5 tagged + all within 14 days
        uses: snok/container-retention-policy@v3
        with:
          account: user
          token: ${{ secrets.GHCR_TOKEN }}          # 使用有 delete:packages 的 PAT
          image-names: edgegojd                     # ← 这里改成新 package 名
          cut-off: 14 days ago
          keep-n-most-recent: 5
          timestamp-to-use: created_at
          tag-selection: both
          dry-run: true                             # 先保持 true 测试，确认后改 false
          rust-log: debug
